name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"
          cache: "maven"

      - name: Run tests
        run: mvn -B -q -Dsurefire.suiteXmlFiles=src/test/resources/testng.xml test
        working-directory: ./dog-api-tests

      - name: Generate Allure HTML
        run: mvn -B -q allure:report
        working-directory: ./dog-api-tests

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dog-api-tests/target/site/allure-maven-plugin

      - name: Upload surefire reports
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: dog-api-tests/target/surefire-reports

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: dog-api-tests/target/allure-results

      - name: Upload Allure HTML
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-html
          path: dog-api-tests/target/site/allure-maven-plugin

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
