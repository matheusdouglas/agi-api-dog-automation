name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"
          cache: "maven"

      - name: Run tests
        run: |
          if [ -d "./dog-api-tests" ]; then cd ./dog-api-tests; fi
          mvn -B -q -Djava.net.preferIPv4Stack=true -Dsurefire.suiteXmlFiles=src/test/resources/testng.xml test

      - name: Generate Allure HTML
        run: |
          if [ -d "./dog-api-tests" ]; then cd ./dog-api-tests; fi
          mvn -B -q allure:report

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          if [ -d "./dog-api-tests/target/site/allure-maven-plugin" ]; then cp -r ./dog-api-tests/target/site/allure-maven-plugin/* _site/; fi
          if [ -d "./target/site/allure-maven-plugin" ]; then cp -r ./target/site/allure-maven-plugin/* _site/; fi

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload surefire reports
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            dog-api-tests/target/surefire-reports
            target/surefire-reports

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: |
            dog-api-tests/target/allure-results
            target/allure-results

      - name: Upload Allure HTML
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-html
          path: |
            dog-api-tests/target/site/allure-maven-plugin
            target/site/allure-maven-plugin

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
